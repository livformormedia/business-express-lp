<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>עסק לכולם · דשבורד מבחני פיצול</title>
  <style>
    @font-face { font-family:'Philosof'; font-weight:700; font-display:swap; src:url('/fonts/philosof-bold.ttf') format('truetype'); }
    @font-face { font-family:'Philosof'; font-weight:400; font-display:swap; src:url('/fonts/philosof-regular.ttf') format('truetype'); }
    :root{ --orange:#E05726; --orangeSoft:#fde3d6; --navy:#1a1a2e; --navyDark:#0a0a14; --cream:#fafaf5; --creamDark:#f1ede2; --muted:#5d6470; }
    *{ box-sizing:border-box; margin:0; }
    body{ font-family:'Philosof','Heebo',system-ui,sans-serif; background:var(--cream); color:var(--navy); -webkit-font-smoothing:antialiased; padding:0 0 60px; }
    .wrap{ max-width:1080px; margin:0 auto; padding:0 20px; }
    header{ background:var(--navyDark); color:#fff; padding:22px 0; margin-bottom:28px; }
    header .wrap{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .brand{ font-weight:700; font-size:22px; display:flex; align-items:center; gap:10px; }
    .dot{ width:9px; height:9px; border-radius:50%; background:#2ecc71; box-shadow:0 0 0 0 rgba(46,204,113,.6); animation:pulse 2s infinite; }
    @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(46,204,113,.5)} 70%{box-shadow:0 0 0 8px rgba(46,204,113,0)} 100%{box-shadow:0 0 0 0 rgba(46,204,113,0)} }
    .updated{ color:rgba(255,255,255,.55); font-size:13px; }
    h2{ font-size:15px; color:var(--muted); font-weight:700; margin:30px 0 12px; letter-spacing:.02em; }
    .kpis{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .kpi{ background:#fff; border:1px solid var(--creamDark); border-radius:18px; padding:20px 22px; }
    .kpi .n{ font-size:42px; font-weight:700; line-height:1; color:var(--navy); }
    .kpi .l{ color:var(--muted); font-size:14px; margin-top:6px; }
    .kpi.hot{ background:var(--orange); border-color:var(--orange); color:#fff; }
    .kpi.hot .n,.kpi.hot .l{ color:#fff; }
    .card{ background:#fff; border:1px solid var(--creamDark); border-radius:20px; padding:22px; }
    .row{ display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .row:last-child{ margin-bottom:0; }
    .row .lab{ width:200px; flex-shrink:0; font-weight:700; font-size:15px; }
    .row .lab small{ display:block; color:var(--muted); font-weight:400; font-size:12px; }
    .bar{ flex:1; height:30px; background:var(--cream); border-radius:8px; overflow:hidden; position:relative; }
    .bar > span{ display:block; height:100%; background:var(--orange); border-radius:8px; transition:width .6s cubic-bezier(.16,1,.3,1); min-width:2px; }
    .row .val{ width:120px; text-align:left; font-weight:700; font-variant-numeric:tabular-nums; }
    .row .val small{ color:var(--muted); font-weight:400; }
    .winner{ display:inline-block; background:var(--orangeSoft); color:var(--orange); font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; margin-right:6px; }
    .trend{ display:flex; align-items:flex-end; gap:6px; height:140px; padding-top:8px; }
    .trend .d{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; }
    .trend .d .b{ width:100%; background:var(--orange); border-radius:6px 6px 0 0; min-height:3px; transition:height .6s ease; }
    .trend .d .t{ font-size:10px; color:var(--muted); }
    .trend .d .c{ font-size:11px; font-weight:700; }
    .muted{ color:var(--muted); }
    .empty{ text-align:center; color:var(--muted); padding:30px; }
    @media(max-width:640px){ .kpis{grid-template-columns:1fr 1fr} .row .lab{width:120px} .row .val{width:80px} }
  </style>
</head>
<body>
  <header><div class="wrap">
    <div class="brand"><span class="dot"></span> עסק לכולם · דשבורד מבחני פיצול</div>
    <div class="updated" id="updated">טוען…</div>
  </div></header>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi hot"><div class="n" id="k-total">—</div><div class="l">סה״כ נרשמים</div></div>
      <div class="kpi"><div class="n" id="k-today">—</div><div class="l">נרשמו היום</div></div>
      <div class="kpi"><div class="n" id="k-7">—</div><div class="l">7 ימים אחרונים</div></div>
    </div>

    <h2>מבחן פיצול — נרשמים לפי גרסת כותרת</h2>
    <div class="card" id="variants"><div class="empty">טוען…</div></div>

    <h2>מאיפה הגיעו — מקור תנועה</h2>
    <div class="card" id="sources"><div class="empty">טוען…</div></div>

    <h2>נרשמים ב-14 הימים האחרונים</h2>
    <div class="card"><div class="trend" id="trend"></div></div>

    <p class="muted" style="text-align:center;margin-top:24px;font-size:13px">מתעדכן אוטומטית כל 30 שניות · נתונים מצטברים, ללא פרטים אישיים</p>
  </div>

  <script>
    var VLABEL = {
      a: { t:'גרסה A', s:'הגדלת הכנסה למשפחה' },
      b: { t:'גרסה B', s:'לפתוח עסק מהצד' },
      c: { t:'גרסה C', s:'משכורת נוספת' },
      d: { t:'גרסה D', s:'משכורת אקסטרה' },
    };
    function pct(n,total){ return total ? Math.round((n/total)*100) : 0; }
    function row(lab, sub, val, w, hot, badge){
      return '<div class="row"><div class="lab">'+(badge?'<span class="winner">'+badge+'</span>':'')+lab+(sub?'<small>'+sub+'</small>':'')+'</div>'+
        '<div class="bar"><span style="width:'+w+'%;'+(hot?'':'background:#c9c2b4')+'"></span></div>'+
        '<div class="val">'+val+'</div></div>';
    }
    function render(d){
      document.getElementById('k-total').textContent = d.total;
      document.getElementById('k-today').textContent = d.today;
      document.getElementById('k-7').textContent = d.last7;
      document.getElementById('updated').textContent = 'עודכן ' + new Date(d.generated_at).toLocaleTimeString('he-IL');

      // variants
      var vkeys = ['a','b','c','d'];
      var vmax = Math.max(1, ...vkeys.map(function(k){return d.variants[k]||0;}));
      var lead = vkeys.slice().sort(function(a,b){return (d.variants[b]||0)-(d.variants[a]||0);})[0];
      var anyV = vkeys.some(function(k){return (d.variants[k]||0)>0;});
      document.getElementById('variants').innerHTML = anyV ? vkeys.map(function(k){
        var n = d.variants[k]||0;
        return row(VLABEL[k].t, VLABEL[k].s, n+' <small>('+pct(n,d.total)+'%)</small>', (n/vmax)*100, true, (k===lead && n>0)?'מוביל':'');
      }).join('') : '<div class="empty">עדיין אין נרשמים. ברגע שתעלה קמפיין, הנתונים יופיעו כאן.</div>';

      // sources
      var smax = Math.max(1, ...d.sources.map(function(s){return s.leads;}));
      document.getElementById('sources').innerHTML = d.sources.length ? d.sources.slice(0,10).map(function(s){
        return row(s.source, '', s.leads+' <small>('+pct(s.leads,d.total)+'%)</small>', (s.leads/smax)*100, true, '');
      }).join('') : '<div class="empty">אין נתוני מקור עדיין.</div>';

      // trend
      var tmax = Math.max(1, ...d.days.map(function(x){return x.leads;}));
      document.getElementById('trend').innerHTML = d.days.map(function(x){
        var dd = x.date.slice(8,10)+'/'+x.date.slice(5,7);
        return '<div class="d"><div class="c">'+(x.leads||'')+'</div><div class="b" style="height:'+(x.leads/tmax*100)+'%"></div><div class="t">'+dd+'</div></div>';
      }).join('');
    }
    function load(){
      fetch('/api/stats',{cache:'no-store'}).then(function(r){return r.json();}).then(render).catch(function(e){
        document.getElementById('updated').textContent = 'שגיאת טעינה';
      });
    }
    load(); setInterval(load, 30000);
  </script>
</body>
</html>
